spring:
  application:
    name: ${SPRING_APPLICATION_NAME:ibkr-dashboard}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trading_db}
    username: ${POSTGRES_USER:trading_user}
    password: ${POSTGRES_PASSWORD:trading_pass}
    driver-class-name: ${POSTGRES_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:always}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}

logging:
  level:
    com.xavopls.ibkr_dashboard: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trading_db}
    username: ${POSTGRES_USER:trading_user}
    password: ${POSTGRES_PASSWORD:trading_pass}

logging:
  level:
    com.xavopls.ibkr_dashboard: INFO
    org.hibernate.SQL: WARN
